[nfs_server]
server ansible_host=192.168.56.10 ansible_ssh_private_key_file=.vagrant/machines/server/virtualbox/private_key

[clients]
client-a ansible_host=192.168.56.21 ansible_ssh_private_key_file=.vagrant/machines/client-a/virtualbox/private_key
client-b ansible_host=192.168.56.22 ansible_ssh_private_key_file=.vagrant/machines/client-b/virtualbox/private_key

[all:vars]
ansible_user=vagrant
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
ansible_python_interpreter=/usr/bin/python3